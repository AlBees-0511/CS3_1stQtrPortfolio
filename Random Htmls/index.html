<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Collection</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Anime Character Collection</h1>

  <!-- Form to add characters -->
  <form id="animeForm">
    <label for="key">Character Key (e.g., naruto)</label>
    <input type="text" id="key" required>

    <label for="name">Name</label>
    <input type="text" id="name" required>

    <label for="age">Age</label>
    <input type="number" id="age" required>

    <label for="anime">Anime</label>
    <input type="text" id="anime" required>

    <button type="submit">Add / Update Character</button>
  </form>

  <!-- Display list -->
  <div class="anime-list" id="animeList"></div>

  <script src="script.js">
    
  </script>
</body>
</html>
