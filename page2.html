<!DOCTYPE html>
<html>
<head>
<style>
.star-container {
  display: inline-block;
  position: relative;
  font-size: 100px; /* size of the star */
  color: gold;      /* star color */
}

.star-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;  /* text size */
  color: black;     /* text color */
  font-weight: bold;
}
</style>
</head>
<body>

<div class="star-container">
  &#9733; <!-- Unicode star -->
  <span class="star-text">A+</span>
</div>

</body>
</html>
