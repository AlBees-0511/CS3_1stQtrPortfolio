<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="costume.css">
</head>
<style>
    p {
        text-align: center;
        font-family: 'Courier New', Courier, monospace;
        font-size: large;
    }
    .keypad {
        display: grid;
        grid-template-columns: repeat(3, 80px);
        grid-gap: 10px;
    }

    .keypad button {
        padding: 15px;
        font-size: 18px;
        border: none;
        background-color: #6c6c6c;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.2s;
        text-align: center;
    }

    .keypad button:hover {
        background-color: #4d4d4d;
    }

    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
    }
</style>
<body>
    <div class="keypad">
    <button onclick="numPad(this)">1</button> <button onclick="numPad(this)">2</button> <button onclick="numPad(this)">3</button>
    <button onclick="numPad(this)">4</button> <button onclick="numPad(this)">5</button> <button onclick="numPad(this)">6</button>
    <button onclick="numPad(this)">7</button> <button onclick="numPad(this)">8</button> <button onclick="numPad(this)">9</button>
    <button onclick="rid()">X</button>        <button onclick="numPad(this)">0</button> <button onclick="leave()">Back</button>
    </div>
    <script>
        let code = ""
        function numPad(button) {
            code += button.innerText
            if (code == "041726") {
                win();
            }

        }
        
        function win() {
            alert("You win!")
        }
    </script>
</body>
</html>
