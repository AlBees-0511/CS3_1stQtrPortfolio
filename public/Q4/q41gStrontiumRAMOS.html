<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="lola.css">
</head>
<body>
    <form>
        <fieldset>
            <h2>Add a Movie</h2>
            <label for="title">Movie Title:</label><br>
            <input type="text" id="title" name="title" required="true"><br><br>

            <label>Image URL</label><br>
            <input type="url" id="image" name="image" required="true"><br><br>

            <label> Year: </label><br>
            <input type="number" id="year" name="year" required="true" min="0" max="10000"><br><br>

            <label> Genre: </label><br>
            <select required="true" id="code">
                <option selected disabled>Select</option>
                <option value="Act">Action</option>
                <option value="Rom">Romance</option>
                <option value="Hor">Horror</option>
                <option value="Sci">Sci-Fi</option>
                <option value="Com">Comedy</option>
            </select>
            <br>
            <br>
            <label> Rating: </label>
            <br>
            <div class="star-rating" id="starRating">
                <span class="star" data-value="5">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="1">&#9733;</span>
            </div>
            <br>
            <br>
            <button type="submit" value="hoo" onclick="outPut()" id="butt_on">Submit</button>
            <div class="moviefav" id="movFav"></div>
    </form>
</body>
</html>

<script>
    const stars = document.querySelectorAll('.star');
    const ratingValue = document.getElementById('ratingValue');
    let selectedRating = 0;

    stars.forEach(star => {
        // Highlight stars on hover
        star.addEventListener('mouseover', function () {
            resetStars();
            this.classList.add('hover');
            let prev = this;
            while (prev) {
                prev.style.color = 'gold';
                prev = prev.nextElementSibling;
            }
        });

        // Remove hover effect when mouse leaves
        star.addEventListener('mouseout', function () {
            resetStars();
            highlightSelected();
        });

        // Set rating on click
        star.addEventListener('click', function () {
            selectedRating = this.getAttribute('data-value');
            ratingValue.textContent = `Your rating: ${selectedRating}`;
            highlightSelected();
        });
    });

    function resetStars() {
        stars.forEach(s => s.style.color = 'lightgray');
    }

    function highlightSelected() {
        stars.forEach(s => {
            if (s.getAttribute('data-value') <= selectedRating) {
                s.style.color = 'gold';
            }
        });
    }
    function outPut() {
        let title = document.getElementById("title").value.trim();
        let year = document.getElementById("year").value.trim();
        let genre = document.getElementById("code").value;
        let button = document.getElementById("butt_on");
        let rating = selectedRating;

        if (title === "" || year === "" || genre === "Select") {
            button.textContent = "Nope.";
            setTimeout(() => {
                button.textContent = "Submit";
            }, 2000);
            return false;
        } else {
            button.textContent = "Submitted!";
            setTimeout(() => {
                button.textContent = "Submit";
            }, 2000);
            alert(`Title: ${title}, Year: ${year}, Genre: ${genre}, Rating: ${rating}`);
            return false;
        }
    }
</script>
