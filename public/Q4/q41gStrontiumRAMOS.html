<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="lola.css">
</head>
<body>
    <form method="post">
        <fieldset>
            <legend> Add a Movie </legend>
            <label for="title">Movie Title:</label><br>
            <input type="text" id="title" name="title" required="true" placeholder="Ex: How to train your dragon"><br><br>

            <label> Year: </label><br>
            <input type="number" id="year" name="year" required="true" placeholder="Ex: 2010"><br><br>

            <label> Genre: </label><br>
            <select required="true">
                <option selected disabled>Select</option>
                <option value="Act">Action</option>
                <option value="Rom">Romance</option>
                <option value="Hor">Horror</option>
                <option value="Sci">Sci-Fi</option>
                <option value="Com">Comedy</option>
            </select>
            <div class="star-rating" id="starRating">
                <span class="star" data-value="5">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="1">&#9733;</span>
            </div>
    </form>
</body>
</html>

<script>
    const stars = document.querySelectorAll('.star');
    const ratingValue = document.getElementById('ratingValue');
    let selectedRating = 0;

    stars.forEach(star => {
        // Highlight stars on hover
        star.addEventListener('mouseover', function () {
            resetStars();
            this.classList.add('hover');
            let prev = this;
            while (prev) {
                prev.style.color = 'gold';
                prev = prev.nextElementSibling;
            }
        });

        // Remove hover effect when mouse leaves
        star.addEventListener('mouseout', function () {
            resetStars();
            highlightSelected();
        });

        // Set rating on click
        star.addEventListener('click', function () {
            selectedRating = this.getAttribute('data-value');
            ratingValue.textContent = `Your rating: ${selectedRating}`;
            highlightSelected();
        });
    });

    function resetStars() {
        stars.forEach(s => s.style.color = 'lightgray');
    }

    function highlightSelected() {
        stars.forEach(s => {
            if (s.getAttribute('data-value') <= selectedRating) {
                s.style.color = 'gold';
            }
        });
    }
</script>
